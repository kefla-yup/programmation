<div class="fade-in">
  <div class="page-header">
    <h4><i class="bi bi-heart-pulse"></i>Mortalité</h4>
    <button class="btn btn-danger" (click)="showForm = !showForm">
      <i class="bi bi-plus-lg"></i><span class="d-none d-sm-inline">Enregistrer</span>
    </button>
  </div>

  <!-- Formulaire -->
  <div class="card mb-3" *ngIf="showForm">
    <div class="card-header header-danger">Nouvelle Mortalité</div>
    <div class="card-body">
      <form (ngSubmit)="add()">
        <div class="row g-3">
          <div class="col-12 col-md-3">
            <label class="form-label">Lot</label>
            <select class="form-select" [(ngModel)]="form.lot_id" name="lot_id" required>
              <option *ngFor="let l of lots" [ngValue]="l.id">{{ l.nom }}</option>
            </select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" [(ngModel)]="form.date_mortalite" name="date_mortalite" required>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label">Nombre de morts</label>
            <input type="number" class="form-control" [(ngModel)]="form.nombre" name="nombre" min="1" required>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Mâles %</label>
            <input type="number" class="form-control" [(ngModel)]="form.pct_males" name="pct_males" min="0" max="100">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Femelles %</label>
            <input type="number" class="form-control" [(ngModel)]="form.pct_femelles" name="pct_femelles" min="0" max="100">
          </div>
          <div class="col-12 col-md-3 d-flex align-items-end gap-2">
            <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg"></i></button>
            <button type="button" class="btn btn-secondary" (click)="showForm = false"><i class="bi bi-x-lg"></i></button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Tableau -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Date</th>
              <th>Lot</th>
              <th>Total</th>
              <th>Mâles %</th>
              <th>Femelles %</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let m of mortaliteList">
              <tr *ngIf="editing !== m.id">
                <td>{{ m.date_mortalite | date:'dd/MM/yyyy':'UTC' }}</td>
                <td><strong>{{ m.lot_nom }}</strong></td>
                <td><span class="badge bg-danger">{{ m.nombre }}</span></td>
                <td><span class="badge bg-info">{{ m.pct_morts_males || 0 }}%</span></td>
                <td><span class="badge bg-info">{{ m.pct_morts_femelles || 0 }}%</span></td>
                <td>
                  <button class="btn btn-outline-warning btn-sm me-1" (click)="edit(m)"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-outline-danger btn-sm" (click)="remove(m.id)"><i class="bi bi-trash"></i></button>
                </td>
              </tr>
              <tr *ngIf="editing === m.id" class="table-warning">
                <td><input type="date" class="form-control form-control-sm" [(ngModel)]="editForm.date_mortalite"></td>
                <td>
                  <select class="form-select form-select-sm" [(ngModel)]="editForm.lot_id">
                    <option *ngFor="let l of lots" [ngValue]="l.id">{{ l.nom }}</option>
                  </select>
                </td>
                <td><input type="number" class="form-control form-control-sm" [(ngModel)]="editForm.nombre" min="1"></td>
                <td><input type="number" class="form-control form-control-sm" [(ngModel)]="editForm.pct_males" min="0" max="100" placeholder="Mâles %"></td>
                <td><input type="number" class="form-control form-control-sm" [(ngModel)]="editForm.pct_femelles" min="0" max="100" placeholder="Femelles %"></td>
                <td>
                  <button class="btn btn-success btn-sm me-1" (click)="saveEdit(m.id)"><i class="bi bi-check-lg"></i></button>
                  <button class="btn btn-secondary btn-sm" (click)="cancelEdit()"><i class="bi bi-x-lg"></i></button>
                </td>
              </tr>
            </ng-container>
            <tr *ngIf="mortaliteList.length === 0">
              <td colspan="6" class="empty-state"><i class="bi bi-inbox"></i>Aucune mortalité</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
