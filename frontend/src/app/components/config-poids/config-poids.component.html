<div class="fade-in">
  <div class="page-header">
    <h4><i class="bi bi-speedometer2"></i>Configuration Poids</h4>
    <button class="btn btn-primary" (click)="showForm = !showForm">
      <i class="bi bi-plus-lg"></i><span class="d-none d-sm-inline">Ajouter</span>
    </button>
  </div>

  <!-- Formulaire ajout -->
  <div class="card mb-3" *ngIf="showForm">
    <div class="card-header header-primary">Nouvelle Configuration</div>
    <div class="card-body">
      <form (ngSubmit)="add()">
        <div class="row g-3">
          <div class="col-6 col-md-2">
            <label class="form-label">Race</label>
            <select class="form-select" [(ngModel)]="form.race_id" name="race_id" required>
              <option *ngFor="let r of races" [ngValue]="r.id">{{ r.nom }}</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Semaine</label>
            <input type="number" class="form-control" [(ngModel)]="form.semaine" name="semaine" min="0" required>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Poids Cumulé (g)</label>
            <input type="number" class="form-control" [(ngModel)]="form.poids_cumule" name="poids_cumule" step="0.01" required>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Variation (g)</label>
            <input type="number" class="form-control" [(ngModel)]="form.variation" name="variation" step="0.01" [disabled]="form.semaine === 0">
          </div>
          <div class="col-6 col-md-2 d-flex align-items-end gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i></button>
            <button type="button" class="btn btn-secondary" (click)="showForm = false"><i class="bi bi-x-lg"></i></button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Filtre -->
  <div class="mb-3">
    <select class="form-select" style="max-width:220px;" [(ngModel)]="filterRace" (ngModelChange)="load()">
      <option value="">Toutes les races</option>
      <option *ngFor="let r of races" [value]="r.id">{{ r.nom }}</option>
    </select>
  </div>

  <!-- Tableau -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Semaine</th>
              <th>Race</th>
              <th>Poids Cumulé</th>
              <th>Variation</th>
              <th>Nourriture/j</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let item of configList">
              <tr *ngIf="editing !== item.id">
                <td><span class="badge bg-info">S{{ item.semaine }}</span></td>
                <td>{{ item.race_nom }}</td>
                <td><strong>{{ item.poids_cumule }} g</strong></td>
                <td>
                  <span *ngIf="item.variation" class="text-success">+{{ item.variation }} g</span>
                  <span *ngIf="!item.variation" class="text-muted">—</span>
                </td>
                <td><span class="badge bg-success">{{ item.nourriture_jour }} g</span> <small class="text-muted">(auto)</small></td>
                <td>
                  <button class="btn btn-outline-warning btn-sm me-1" (click)="edit(item)"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-outline-danger btn-sm" (click)="remove(item.id)"><i class="bi bi-trash"></i></button>
                </td>
              </tr>
              <tr *ngIf="editing === item.id" class="table-warning">
                <td><span class="badge bg-info">S{{ item.semaine }}</span></td>
                <td>{{ item.race_nom }}</td>
                <td><input type="number" class="form-control form-control-sm" [(ngModel)]="editForm.poids_cumule" step="0.01"></td>
                <td><input type="number" class="form-control form-control-sm" [(ngModel)]="editForm.variation" step="0.01"></td>
                <td><span class="badge bg-success">auto</span></td>
                <td>
                  <button class="btn btn-success btn-sm me-1" (click)="saveEdit(item.id)"><i class="bi bi-check-lg"></i></button>
                  <button class="btn btn-secondary btn-sm" (click)="cancelEdit()"><i class="bi bi-x-lg"></i></button>
                </td>
              </tr>
            </ng-container>
            <tr *ngIf="configList.length === 0">
              <td colspan="6" class="empty-state"><i class="bi bi-inbox"></i>Aucune configuration</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
